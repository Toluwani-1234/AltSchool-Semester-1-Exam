<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Saheed's Weather App</title>
  </head>
  <body>
    <div class="container">
      <header>
        <p class="weather-icon">icon</p>
        <p>Weather App</p>
      </header>
      <main>
        <section class="hero">
          <div class="hero-body">
            <div class="hero-header-search">
              <input
                class="hero-textbox"
                type="text"
                name="search"
                id="txtSearch"
                placeholder="Search for a place..." />
              <button id="btnSearch" class="hero-button" type="submit">
                Search
              </button>
            </div>

            <div id="loading-message"></div>

            <div class="hero-content">
              <p class="display-icon">Icon</p>
              <p class="location">Lagos, Nigeria</p>
              <p class="temperature">32&deg;C</p>
              <div class="temp-description">
                <p class="temp-description-word">Sun</p>
                <span class="temp-description-divider">•</span>
                <p class="temp-description-text">Feels like 36&deg;C.</p>
              </div>
            </div>

            <div class="hero-footer">
              <div class="desc">
                <p class="desc-text">Humidity</p>
                <p class="desc-value">78%</p>
              </div>

              <div class="divider"></div>

              <div class="desc">
                <p class="desc-text">Wind</p>
                <p class="desc-value">14 km/h</p>
              </div>

              <div class="divider"></div>

              <div class="desc">
                <p class="desc-text">UV Index</p>
                <p class="desc-value">High</p>
              </div>
            </div>
          </div>
        </section>

        <div id="error-message"></div>

        <section class="forecast">
          <div class="forecast-header">5-DAY FORECAST</div>
          <div class="forecast-slide">
            <p class="forecast-day">Today</p>
            <p class="forecast-icon">Icon</p>
            <div class="forecast-temperature">
              <p>34&deg;</p>
              <p>27&deg;</p>
            </div>
          </div>
          <div class="forecast-slide">
            <p class="forecast-day">Tuesday</p>
            <p class="forecast-icon">Icon</p>
            <div class="forecast-temperature">
              <p>31&deg;</p>
              <p>25&deg;</p>
            </div>
          </div>
          <div class="forecast-slide">
            <p class="forecast-day">Wednesday</p>
            <p class="forecast-icon">Icon</p>
            <div class="forecast-temperature">
              <p>28&deg;</p>
              <p>24&deg;</p>
            </div>
          </div>
          <div class="forecast-slide">
            <p class="forecast-day">Thursday</p>
            <p class="forecast-icon">Icon</p>
            <div class="forecast-temperature">
              <p>27&deg;</p>
              <p>23&deg;</p>
            </div>
          </div>
          <div class="forecast-slide">
            <p class="forecast-day">Friday</p>
            <p class="forecast-icon">Icon</p>
            <div class="forecast-temperature">
              <p>33&deg;</p>
              <p>26&deg;</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
